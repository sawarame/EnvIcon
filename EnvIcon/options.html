<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>EnvIcon</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        padding: 2rem;
        min-width: 600px;
      }

      .logo-preview {
        max-width: 150px;
        max-height: 50px;
        border: 1px solid #ccc;
        margin-top: 5px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1 class="mb-4">EnvIcon</h1>

      <div class="card">
        <div class="card-header">Favicon Replacement Settings</div>
        <div class="card-body">
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              id="faviconEnabled"
            />
            <label class="form-check-label" for="faviconEnabled">
              Enable environment-specific favicon replacement
            </label>
          </div>
          <div class="mt-3">
            <label class="form-label">Production Hostnames</label>
            <div id="prodHostnamesContainer"></div>
            <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="addProdHostname">Add Hostname</button>
          </div>
          <div class="mt-3">
            <label class="form-label">Staging Hostnames</label>
            <div id="stgHostnamesContainer"></div>
            <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="addStgHostname">Add Hostname</button>
          </div>
          <div class="mt-3">
            <label class="form-label">Development Hostnames</label>
            <div id="devHostnamesContainer"></div>
            <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="addDevHostname">Add Hostname</button>
          </div>
        </div>
      </div>

      <hr class="my-4" />

      <button id="save" class="btn btn-primary">Save</button>
      <span id="status" class="ms-2"></span>
    </div>

    <script src="js/options.js"></script>
  </body>
</html>
